<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crypto Diver | Bybit Futures Heatmap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050a08">
</head>
<body data-theme="dark">

  <!-- Background System -->
  <div class="bg-system-wrapper">
    <div class="bg-layer bg-layer-dark"></div>
    <div class="bg-layer bg-layer-light"></div>
    <div class="bg-particles" id="bg-particles"></div>
  </div>

  <!-- Diver Circles -->
  <div id="divers-container">
    <div class="diver-group bull">
      <div class="diver-circle bull"></div>
      <div class="diver-circle bull"></div>
      <div class="diver-circle bull"></div>
      <div class="diver-circle bull"></div>
    </div>
    <div class="diver-group bear">
      <div class="diver-circle bear"></div>
      <div class="diver-circle bear"></div>
      <div class="diver-circle bear"></div>
      <div class="diver-circle bear"></div>
    </div>
  </div>

  <!-- Geometric Shapes -->
  <div id="geometric-shapes-container"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">🤿 LOADING FUTURES...</p>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span>🤿</span>
      <span>CRYPTO DIVER</span>
      <span class="futures-badge">🎯 Perps</span>
      <div class="ws-indicator" id="ws-indicator" title="WebSocket status"></div>
    </div>
    <div class="header-right">
      <div class="stats">
        <div class="stat">
          <div class="stat-value bullish" id="stat-bullish">0</div>
          <div class="stat-label">Bullish</div>
        </div>
        <div class="stat">
          <div class="stat-value bearish" id="stat-bearish">0</div>
          <div class="stat-label">Bearish</div>
        </div>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme (T)">
        <span id="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <!-- Filter System -->
  <div class="filter-system" id="filter-system">
    <div class="filter-container">
      <div class="filter-row">
        <div class="category-filters">
          <button class="category-btn active" data-category="all">All</button>
          <button class="category-btn gainers" data-category="gainers">Gainers ▲</button>
          <button class="category-btn losers" data-category="losers">Losers ▼</button>
          <button class="category-btn" data-category="majors">Majors</button>
          <!-- Watchlist button injected by JS -->
        </div>
        <div class="sort-controls">
          <select class="sort-select" id="sort-select">
            <option value="volume">Volume</option>
            <option value="change">Change %</option>
            <option value="price">Price</option>
            <option value="name">Name</option>
            <option value="funding">Funding Rate</option>
            <option value="oi">Open Interest</option>
          </select>
          <button class="sort-direction-btn" id="sort-direction">↓</button>
        </div>
      </div>
      <div class="filter-row-secondary">
        <div class="search-alert-row">
          <div class="filter-search">
            <span class="filter-search-icon">🔍</span>
            <input type="text" class="filter-search-input" id="filter-search" placeholder="Search coin..." autocomplete="off">
            <button class="filter-search-clear" id="search-clear">×</button>
          </div>
          <button class="alert-toggle-btn" id="alert-toggle" title="Toggle volume alerts">
            <span class="bell-icon">🔔</span>
            <span>Alerts</span>
          </button>
        </div>
        <div class="volume-filter">
          <span class="volume-filter-label">📊 Min Volume:</span>
          <div class="volume-slider-wrapper">
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="8" step="1" value="0">
          </div>
          <span class="volume-value" id="volume-value">All</span>
        </div>
        <!-- Advanced filters -->
        <div class="advanced-filters">
          <select class="advanced-filter-select" id="funding-filter" title="Funding Rate">
            <option value="all">💰 Funding: All</option>
            <option value="positive">Positive</option>
            <option value="negative">Negative</option>
          </select>
          <select class="advanced-filter-select" id="oi-filter" title="Open Interest Change">
            <option value="all">📈 OI: All</option>
            <option value="increasing">Increasing</option>
            <option value="decreasing">Decreasing</option>
          </select>
        </div>
        <div class="results-count" id="results-count">0 futures</div>
      </div>
      <div class="active-filters" id="active-filters"></div>
    </div>
  </div>

  <!-- Alert Banner -->
  <div class="alert-banner" id="alert-banner">
    <span class="alert-icon">⚡</span>
    <div class="alert-content">
      <div class="alert-title" id="alert-title">Alert</div>
      <div class="alert-text" id="alert-text">Something happened!</div>
    </div>
    <button class="alert-close" id="alert-close">×</button>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <div id="bubble-container"></div>
  </main>

  <!-- Bottom Nav (Mobile) -->
  <nav class="bottom-nav">
    <button class="bottom-nav-item active" data-tab="heatmap">
      <span class="bottom-nav-icon">🌊</span><span>Heatmap</span>
    </button>
    <button class="bottom-nav-item" data-tab="search">
      <span class="bottom-nav-icon">🔍</span><span>Search</span>
    </button>
    <button class="bottom-nav-item" data-tab="watchlist">
      <span class="bottom-nav-icon">⭐</span><span>Watchlist</span>
    </button>
    <button class="bottom-nav-item" data-tab="settings">
      <span class="bottom-nav-icon">⚙️</span><span>Settings</span>
    </button>
  </nav>

  <!-- Enhanced Modal -->
  <div class="enhanced-modal" id="enhanced-modal">
    <div class="enhanced-modal-content">
      <div class="modal-swipe-handle"></div>
      <div class="modal-header">
        <button class="modal-nav prev" id="modal-prev">‹</button>
        <button class="modal-nav next" id="modal-next">›</button>
        <button class="modal-close-btn" id="modal-close">×</button>
        <div class="coin-symbol-large" id="modal-symbol">BTC</div>
        <div class="coin-full-name" id="modal-name">Bitcoin</div>
      </div>
      <div class="price-section">
        <div class="price-display" id="modal-price">$0.00</div>
        <div class="price-change-pill" id="modal-change">+0.00%</div>
      </div>
      <!-- TradingView Chart -->
      <div class="chart-container">
        <div class="chart-wrapper" id="tradingview-chart"></div>
      </div>
      <div class="modal-stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">📊 Volume 24h</div>
          <div class="stat-card-value highlight" id="modal-volume">-</div>
          <div class="volume-bars" id="modal-volume-bars"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">📈 Turnover 24h</div>
          <div class="stat-card-value highlight" id="modal-turnover">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">⬆️ High 24h</div>
          <div class="stat-card-value" id="modal-high">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">⬇️ Low 24h</div>
          <div class="stat-card-value" id="modal-low">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">🏦 Open Interest</div>
          <div class="stat-card-value" id="modal-oi">-</div>
          <div class="stat-card-sub" id="modal-oi-change">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">💰 Funding Rate</div>
          <div class="stat-card-value" id="modal-funding">-</div>
        </div>
        <div class="stat-card" style="grid-column: span 2">
          <div class="stat-card-label">📍 Price Range</div>
          <div class="hl-progress">
            <div class="hl-progress-bar" id="modal-hl-progress" style="width:50%"></div>
          </div>
          <div class="hl-labels">
            <span id="modal-hl-low">Low</span>
            <span id="modal-hl-current">Current</span>
            <span id="modal-hl-high">High</span>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="action-btn primary" id="btn-trade">
          <span class="action-icon">🚀</span><span class="action-label">Trade</span>
        </button>
        <button class="action-btn" id="modal-watchlist-btn">
          <span class="action-icon">☆</span><span class="action-label">Watch</span>
        </button>
        <button class="action-btn" id="btn-copy">
          <span class="action-icon">📋</span><span class="action-label">Copy</span>
        </button>
        <button class="action-btn" id="btn-share">
          <span class="action-icon">🔗</span><span class="action-label">Share</span>
        </button>
      </div>
    </div>
    <div class="modal-toast" id="modal-toast">
      <span>✓</span><span id="toast-message">Copied!</span>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
